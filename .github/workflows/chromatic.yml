# .github/workflows/chromatic.yml

# Workflow name
name: 📖 Storybook (via Chromatic)

# Event for the workflow
on:
  # 👇 Triggers the workflow on push events to the main branch
  push:
    branches:
      - main
  # 👇 Triggers the workflow on pull request events to the main branch
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'packages/ui-tests/cypress/**'
    types: [opened, synchronize, reopened, ready_for_review]

# List of jobs
jobs:
  chromatic-deployment:
    if: github.repository == 'KaotoIO/kaoto' && github.actor != 'renovate[bot]' && !github.event.pull_request.draft
    # Operating System
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # Job steps
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # 👇 Fetches all Git history so that Chromatic can compare against the previous version
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@kaoto'
          cache: 'yarn'

      # 👇 Install dependencies with the same package manager used in the project (replace it as needed), e.g. yarn, npm, pnpm
      - name: Install dependencies
        run: yarn

      # 👇 Builds the kaoto/ui in library mode
      - name: Build ui library
        run: yarn workspace @kaoto/kaoto run build:lib

      # 👇 Remove ui-mockups directory from stories
      - name: Remove ui-mockups directory
        run: rm -rf packages/ui-tests/stories/ui-mockups

      # 👇 Adds Chromatic as a step in the workflow
      - name: Publish to Chromatic
        uses: chromaui/action@07791f8243f4cb2698bf4d00426baf4b2d1cb7e0
        # Chromatic GitHub Action options
        with:
          # This token needs to be specified directly here so forks of the repository can push their changes to the chromatic UI
          projectToken: chpt_7d9db951361ed23
          buildScriptName: build:storybook
          workingDir: packages/ui-tests
